name: Release

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Standard path: push to main runs release-please, which opens/updates the
# release PR. When that PR is merged, release-please creates the tag and the
# build job publishes binaries + deploys the Homebrew formula.
#
# Manual overrides:
#   deploy_homebrew_tag — re-deploy the formula for an existing release tag
#   without creating a new release. Use this when a deploy fails mid-release
#   or when HOMEBREW_TAP_TOKEN is first configured.
#
# To force a specific version bump without waiting for release-please to
# decide, include "[Release-As: x.y.z]" in a commit message on main.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_homebrew_tag:
        description: "Re-deploy Homebrew formula for an existing tag (e.g. otto-stack-v1.2.0)"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pull-requests: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Create or update the release PR; publish the GitHub release when merged.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or update release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/.release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Release created
        if: steps.release.outputs.releases_created
        run: |
          echo "🎉 Release created: ${{ steps.release.outputs.tag_name }}"
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag_name }}"

  # ---------------------------------------------------------------------------
  # Build binaries for all platforms, publish release assets, deploy formula.
  # Only runs when a GitHub release was just created by the release job.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.release_created == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Load workflow configuration
        id: config
        uses: ./.github/actions/load-config

      - name: Load release configuration
        id: release-config
        run: |
          HOMEBREW_ENABLED=$(yq eval '.package_managers.homebrew.enabled' .github/config/release-config.yaml)
          echo "homebrew-enabled=$HOMEBREW_ENABLED" >> $GITHUB_OUTPUT

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          install-task: "true"

      - name: Set build variables
        run: |
          echo "TAG_NAME=${{ needs.release.outputs.tag_name }}" >> $GITHUB_ENV
          echo "COMMIT=${GITHUB_SHA::8}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Build all platforms
        run: |
          # Pass VERSION explicitly so git describe --dirty is never consulted.
          # setup-environment generates gitignored files that would otherwise
          # mark the working tree dirty and corrupt the embedded version string.
          task build-all VERSION="${{ needs.release.outputs.tag_name }}"

      - name: Verify binary version
        run: |
          BUILD_DIR="${{ steps.config.outputs.build-dir }}"
          CLI_BINARY="${{ steps.config.outputs.cli-binary }}"
          EXPECTED_TAG="${{ env.TAG_NAME }}"

          chmod +x "$BUILD_DIR/$CLI_BINARY-linux-amd64"
          REPORTED="$("$BUILD_DIR/$CLI_BINARY-linux-amd64" version 2>/dev/null \
            || "$BUILD_DIR/$CLI_BINARY-linux-amd64" --version 2>/dev/null \
            || true)"

          if echo "$REPORTED" | grep -q "\-dirty"; then
            echo "❌ Binary embeds '-dirty' — was built from an unclean tree"
            exit 1
          fi

          if ! echo "$REPORTED" | grep -qF "$EXPECTED_TAG"; then
            echo "❌ Binary reports '$REPORTED', expected tag '$EXPECTED_TAG'"
            exit 1
          fi

          echo "✅ Version verified: $REPORTED"

      - name: Generate checksums
        run: |
          cd "${{ steps.config.outputs.build-dir }}"
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Verify checksums
        run: |
          cd "${{ steps.config.outputs.build-dir }}"
          sha256sum -c checksums.txt
          echo "✅ All checksums verified"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ env.TAG_NAME }}" \
            "${{ steps.config.outputs.build-dir }}"/* \
            --clobber

      - name: Deploy Homebrew formula
        if: steps.release-config.outputs.homebrew-enabled == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/homebrew.sh update -v "${{ env.TAG_NAME }}"
          ./scripts/homebrew.sh deploy -v "${{ env.TAG_NAME }}"

      - name: Verify Homebrew tap deployment
        if: steps.release-config.outputs.homebrew-enabled == 'true'
        run: |
          EXPECTED_VERSION="${{ needs.release.outputs.version }}"
          TAP_FORMULA_URL="https://raw.githubusercontent.com/otto-nation/homebrew-tap/main/Formula/otto-stack.rb"

          # Allow a few seconds for GitHub to serve the updated raw content
          sleep 5

          TAP_CONTENT=$(curl -fsSL "$TAP_FORMULA_URL")

          if ! echo "$TAP_CONTENT" | grep -qF "version \"$EXPECTED_VERSION\""; then
            echo "❌ Tap formula does not contain expected version '$EXPECTED_VERSION'"
            echo "Formula content (first 20 lines):"
            echo "$TAP_CONTENT" | head -20
            exit 1
          fi

          echo "✅ Tap formula verified at version $EXPECTED_VERSION"

  # ---------------------------------------------------------------------------
  # Write a summary for the completed release. Runs even when build partially
  # fails so the job status table is always written to the workflow run.
  # ---------------------------------------------------------------------------
  post-release:
    name: Post-Release
    runs-on: ubuntu-latest
    needs: [release, build]
    if: always() && needs.release.outputs.release_created == 'true'
    steps:
      - name: Release summary
        run: |
          echo "## 🚀 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Assets" >> $GITHUB_STEP_SUMMARY
          echo "- [Release page](https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag_name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "🎉 **Status**: Release completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Status**: Release completed with issues — build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Manual escape hatch: re-deploy the Homebrew formula for an existing tag.
  # Use this when the automated deploy fails (e.g. HOMEBREW_TAP_TOKEN missing)
  # or to correct a formula for a previously-released version.
  # ---------------------------------------------------------------------------
  deploy-homebrew:
    name: Deploy Homebrew Formula
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_homebrew_tag != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Load workflow configuration
        uses: ./.github/actions/load-config

      - name: Deploy formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.deploy_homebrew_tag }}"
          echo "🍺 Deploying Homebrew formula for $TAG..."
          ./scripts/homebrew.sh update -v "$TAG"
          ./scripts/homebrew.sh deploy -v "$TAG"

      - name: Verify deployment
        run: |
          # Extract semver from tag (e.g. v1.2.0 → 1.2.0)
          TAG="${{ inputs.deploy_homebrew_tag }}"
          VERSION="${TAG#v}"
          TAP_FORMULA_URL="https://raw.githubusercontent.com/otto-nation/homebrew-tap/main/Formula/otto-stack.rb"

          sleep 5
          TAP_CONTENT=$(curl -fsSL "$TAP_FORMULA_URL")

          if ! echo "$TAP_CONTENT" | grep -qF "version \"$VERSION\""; then
            echo "❌ Tap formula does not contain expected version '$VERSION'"
            echo "Formula content (first 20 lines):"
            echo "$TAP_CONTENT" | head -20
            exit 1
          fi

          echo "✅ Tap formula verified at version $VERSION"

  # ---------------------------------------------------------------------------
  # Surface a clear failure signal when a release was created but the build
  # or post-release steps did not complete successfully.
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [release, build, post-release]
    if: failure() && needs.release.outputs.release_created == 'true'
    steps:
      - name: Failure summary
        run: |
          echo "❌ Release pipeline failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-Release | ${{ needs.post-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY

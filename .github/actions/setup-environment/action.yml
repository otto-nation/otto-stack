name: "Setup Development Environment"
description: "Setup Go, install common tools, and prepare environment for otto-stack workflows"

inputs:
  install-task:
    description: "Install Task runner"
    required: false
    default: "true"
  install-tools:
    description: "Install additional tools (yq, jq)"
    required: false
    default: "false"
  run-generate:
    description: "Run code generation (task generate). Only needed in jobs that require fresh generated output."
    required: false
    default: "false"
  cache-key-suffix:
    description: "Additional suffix for cache key"
    required: false
    default: ""

outputs:
  go-version:
    description: "The Go version that was installed"
    value: ${{ steps.setup-go.outputs.go-version }}
  task-installed:
    description: "Whether Task was installed"
    value: ${{ steps.install-task.outputs.installed }}

runs:
  using: "composite"
  steps:
    - name: Setup Go
      id: setup-go
      uses: ./.github/actions/setup-go-version

    - name: Load workflow configuration
      id: config
      shell: bash
      run: |
        if [ -f ".github/config/workflow-config.yml" ]; then
          echo "config-exists=true" >> $GITHUB_OUTPUT
        else
          echo "config-exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Cache Task binary
      if: inputs.install-task == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.local/bin/task
        key: task-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/config/workflow-config.yml') }}

    - name: Install Task runner
      id: install-task
      if: inputs.install-task == 'true'
      shell: bash
      run: |
        if command -v task >/dev/null 2>&1; then
          echo "Task already installed: $(task --version)"
          echo "installed=true" >> $GITHUB_OUTPUT
        else
          echo "Installing Task runner..."
          curl -sSfL https://taskfile.dev/install.sh | sh -s -- -b ~/.local/bin
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "installed=true" >> $GITHUB_OUTPUT
          echo "Task installed: $(task --version)"
        fi

    - name: Install additional tools
      if: inputs.install-tools == 'true'
      shell: bash
      run: |
        if ! command -v yq >/dev/null 2>&1; then
          YQ_VERSION="v4.47.2"
          sudo wget -q "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          echo "yq installed: $(yq --version)"
        fi
        echo "jq version: $(jq --version)"

    - name: Run code generation
      if: inputs.run-generate == 'true' && inputs.install-task == 'true'
      shell: bash
      run: task generate

    - name: Download Go dependencies
      shell: bash
      run: go mod download

    - name: Environment summary
      shell: bash
      run: |
        echo "Go version: $(go version)"
        if command -v task >/dev/null 2>&1; then
          echo "Task version: $(task --version)"
        fi

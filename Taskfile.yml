version: "3"

# ============================================================================
# VARIABLES
# ============================================================================
vars:
  BINARY_NAME: otto-stack
  BUILD_DIR: build
  MODULE_PATH: github.com/otto-nation/otto-stack
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  GO_VERSION:
    sh: go version | cut -d' ' -f3
  BUILD_OS:
    sh: echo "{{OS}}"
  BUILD_ARCH:
    sh: echo "{{ARCH}}"
  LDFLAGS: '-ldflags "-X {{.MODULE_PATH}}/internal/pkg/version.AppVersion={{.VERSION}} -X {{.MODULE_PATH}}/internal/pkg/version.BuildDate={{.BUILD_DATE}} -X {{.MODULE_PATH}}/internal/pkg/version.GitCommit={{.COMMIT}} -X {{.MODULE_PATH}}/internal/pkg/version.BuildBy=taskfile"'
  GOLANGCI_LINT_VERSION: "v2.6.0"

# ============================================================================
# TASKS
# ============================================================================
tasks:
  # ============================================================================
  # DEFAULT
  # ============================================================================
  default:
    desc: "🚀 Build the binary (default task)"
    silent: true
    cmds:
      - task: build

  # ============================================================================
  # GENERATE
  # ============================================================================
  generate:
    desc: "🔧 Generate code from YAML configs"
    sources:
      - "internal/config/commands.yaml"
      - "internal/config/services/**/*.yaml"
      - "cmd/generate-*/main.go"
      - "cmd/generate-*/templates/*.tmpl"
    generates:
      - "internal/pkg/cli/generated/constants_generated.go"
      - "internal/pkg/cli/generated/commands_generated.go"
      - "internal/pkg/constants/services_generated.go"
      - "internal/pkg/constants/types_generated.go"
    silent: true
    cmds:
      - echo "🔧 Generating code from YAML configs..."
      - |
        echo "🔧 Cleaning existing generated files..."
        find internal/ -name '*_generated.go' -type f -delete
        echo "🔧 Running generate-cli..."
        go run ./cmd/generate-cli
        echo "🔧 Running generate-services..."
        go run ./cmd/generate-services
        echo "🔧 Running generate-commands..."
        go run ./cmd/generate-commands
      - echo "✅ Generated code from YAML configs"

  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    desc: "🔨 Build the Go binary for current platform"
    deps: [sync-go-version, deps, lint]
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"
    silent: true
    cmds:
      - echo "🔨 Building {{.BINARY_NAME}}..."
      - mkdir -p {{.BUILD_DIR}}
      - go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./cmd/otto-stack
      - echo "✅ Built at {{.BUILD_DIR}}/{{.BINARY_NAME}}"

  build-all:
    desc: "🌍 Build binaries for all supported platforms"
    deps: [deps, lint]
    silent: true
    cmds:
      - echo "🌍 Building {{.BINARY_NAME}} for all platforms..."
      - mkdir -p {{.BUILD_DIR}}
      - GOOS=linux GOARCH=amd64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64 ./cmd/otto-stack
      - GOOS=linux GOARCH=arm64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-arm64 ./cmd/otto-stack
      - GOOS=darwin GOARCH=amd64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-amd64 ./cmd/otto-stack
      - GOOS=darwin GOARCH=arm64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-arm64 ./cmd/otto-stack
      - GOOS=windows GOARCH=amd64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-windows-amd64.exe ./cmd/otto-stack
      - echo "✅ All binaries built in {{.BUILD_DIR}}/"

  install:
    desc: "📦 Install the binary to GOPATH/bin"
    deps: [build]
    silent: true
    cmds:
      - echo "📦 Installing {{.BINARY_NAME}}..."
      - go install {{.LDFLAGS}} ./cmd/otto-stack
      - echo "✅ Installed to $(go env GOPATH)/bin/{{.BINARY_NAME}}"

  # ============================================================================
  # DEVELOPMENT
  # ============================================================================
  dev:
    desc: "🚀 Quick start - build and show help"
    deps: [build]
    silent: true
    cmds:
      - echo "🚀 Running {{.BINARY_NAME}} in development mode..."
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}} --help

  watch:
    desc: "👀 Watch for changes and rebuild automatically"
    watch: true
    sources:
      - "**/*.go"
    silent: true
    cmds:
      - echo "👀 Rebuilding due to changes..."
      - task: build

  # ============================================================================
  # DEPENDENCIES
  # ============================================================================
  deps:
    desc: "📥 Download and tidy Go dependencies"
    deps: [generate]
    sources:
      - "go.mod"
      - "go.sum"
      - "**/*.go"
    generates:
      - ".deps-timestamp"
    silent: true
    cmds:
      - echo "📥 Downloading Go dependencies..."
      - go mod download
      - go mod tidy
      - touch .deps-timestamp
      - echo "✅ Dependencies updated"

  # ============================================================================
  # GIT AUTOMATION
  # ============================================================================
  commit:
    desc: "🤖 Generate AI-powered commit message based on staged changes"
    silent: true
    deps: [pre-commit]
    cmds:
      - |
        if [ "$NO_VERIFY" ]; then
            echo 'pre-commit hook skipped' 1>&2
            exit 0
        fi
        STAGED_FILES=$(git diff --cached --name-only)
        if [ -z "$STAGED_FILES" ]; then
          echo "❌ No staged changes found. Use 'git add' first."
          exit 1
        fi

        echo "🤖 Analyzing staged changes with AI..."

        DIFF_CONTENT=$(git diff --cached --no-color)
        FILE_LIST=$(echo "$STAGED_FILES" | tr '\n' ', ' | sed 's/,$//')
        COMMITLINT_CONFIG=$(cat .github/.commitlintrc.json)

        AI_PROMPT="Generate a conventional commit message following these rules:
        - Header (first line) must be ≤72 characters (no exceptions). Use ';' to separate multiple changes.
        - Body lines must be ≤100 characters each
        - Use conventional commit format: type(scope): description
        - Separate header and body with blank line
        - Use bullet points for multiple changes

        Config: $COMMITLINT_CONFIG

        Files changed: $FILE_LIST

        Diff:
        $DIFF_CONTENT

        Return only the commit message, nothing else."

        source ./scripts/ai-helper.sh

        if ! AI_COMMAND=$(check_ai_available 2>&1); then
          echo "$AI_COMMAND"
          exit 1
        fi

        echo "🤖 Generating commit message..."
        COMMIT_MSG=$(echo "$AI_PROMPT" | $AI_COMMAND | tr -d '\033' | sed 's/\[[0-9;]*m//g' | sed 's/^[> ]*//g')
        echo "✨ AI Analysis Complete"
        echo ""
        echo "📝 Generated: $COMMIT_MSG"
        echo "🚀 Committing..."
        git commit -m "$COMMIT_MSG"
        echo "✅ Committed successfully!"

  create-pr:
    desc: "🤖 Create AI-powered pull request with smart title and description"
    silent: true
    cmds:
      - |
        BRANCH=$(git branch --show-current)
        if [ "$BRANCH" = "main" ]; then
          echo "❌ Cannot create PR from main branch"
          exit 1
        fi

        echo "🤖 Analyzing branch changes with AI: $BRANCH"

        # Get comprehensive change analysis

        # commits that are in the current branch but not in main
        COMMITS=$(git log --oneline origin/main..HEAD)
        COMMIT_COUNT=$(git rev-list --count origin/main..$BRANCH)
        CHANGED_FILES=$(git diff --name-only origin/main..$BRANCH)
        PR_TEMPLATE=$(cat .github/PULL_REQUEST_TEMPLATE.md)

        # Create AI prompt with PR template
        AI_PROMPT="Generate a professional PR title and fill out this template based on the changes:

        Template:
        $PR_TEMPLATE

        Branch: $BRANCH
        Commits: $COMMIT_COUNT

        Recent commits:
        $COMMITS

        Changed files:
        $CHANGED_FILES

        Return: TITLE: <title>
        DESCRIPTION: <filled template>"

        # Use AI to generate PR content
        source ./scripts/ai-helper.sh

        if ! AI_COMMAND=$(check_ai_available 2>&1); then
          echo "$AI_COMMAND"
          exit 1
        fi

        echo "🤖 Generating PR title and description..."
          RAW_RESPONSE=$(echo "$AI_PROMPT" | $AI_COMMAND)
          # Strip all ANSI escape sequences and control characters
          AI_RESPONSE=$(echo "$RAW_RESPONSE" | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g' | sed 's/\x1b\[[0-9;]*R//g' | tr -d '\033\007\015' | sed 's/^[> ]*//g')

          TITLE=$(echo "$AI_RESPONSE" | grep "^TITLE:" | sed 's/^TITLE: //' | head -1 | tr -d '\n\r')
          DESCRIPTION=$(echo "$AI_RESPONSE" | sed -n '/^DESCRIPTION:/,$ p' | sed '1d')

          if [ -z "$TITLE" ]; then TITLE="feat: improve codebase"; fi
          if [ -z "$DESCRIPTION" ]; then DESCRIPTION="## Summary\n\nBranch: $BRANCH\nCommits: $COMMIT_COUNT"; fi

          echo "✨ AI Analysis Complete"
          echo ""
          echo "📝 Title: $TITLE"
          echo "🚀 Creating PR..."

          PR_URL=$(gh pr create --title "$TITLE" --body "$DESCRIPTION" --assignee @me 2>&1 | grep -o 'https://github.com[^[:space:]]*' || echo "")

          echo "✅ Pull request created!"
          if [ -n "$PR_URL" ]; then echo "🔗 View: $PR_URL"; fi

  push-and-pr:
    desc: "🚀 Push current branch and create PR in one command"
    silent: true
    cmds:
      - |
        BRANCH=$(git branch --show-current)
        echo "🚀 Pushing branch: $BRANCH"
        git push -u origin $BRANCH
      - task: create-pr

  pre-commit:
    desc: "🔒 Run all pre-commit checks"
    silent: true
    cmds:
      - echo "🔒 Running pre-commit checks..."
      - task: pre-commit-fix
      - task: pre-commit-verify

  pre-commit-fix:
    desc: "🔧 Auto-fix formatting and module issues"
    silent: true
    cmds:
      - echo "🔧 Auto-fixing formatting and modules..."
      - git diff --name-only > /tmp/git_before_fixes || touch /tmp/git_before_fixes
      - task: generate
      - task: fmt
      - task: docs-fmt
      - go mod tidy

  pre-commit-verify:
    desc: "✅ Verify all checks pass after fixes"
    silent: true
    cmds:
      - |
        echo "✅ Verifying fixes..."
        # Check if pre-commit-fix made changes by comparing before/after states
        if [ -f /tmp/git_before_fixes ]; then
          git diff --name-only > /tmp/git_after_fixes
          if ! cmp -s /tmp/git_before_fixes /tmp/git_after_fixes; then
            echo ""
            echo "❌ Pre-commit failed: Files were modified during formatting"
            echo ""
            echo "📋 Modified files:"
            git diff --name-only
            echo ""
            echo "🔧 Please add these changes and commit again:"
            echo "   git add ."
            echo "   git commit"
            echo ""
            rm -f /tmp/git_before_fixes /tmp/git_after_fixes
            exit 1
          fi
          rm -f /tmp/git_before_fixes /tmp/git_after_fixes
        fi
      - task: lint
      - task: validate-homebrew-formula
      - echo "✅ Pre-commit checks passed"

  validate-homebrew-formula:
    desc: "🍺 Validate Homebrew formula syntax and style"
    silent: true
    cmds:
      - |
        echo "🍺 Validating Homebrew formula..."
        if [ -f "Formula/otto-stack.rb" ]; then
          if command -v brew >/dev/null 2>&1; then
            brew style Formula/otto-stack.rb
            echo "✅ Homebrew formula validation passed"
          else
            echo "⚠️  Homebrew not installed, skipping formula validation"
          fi
        else
          echo "ℹ️  No Homebrew formula found, skipping validation"
        fi

  pre-push:
    desc: "🚀 Run all pre-push checks"
    silent: true
    cmds:
      - echo "🚀 Running pre-push checks..."
      - task: build
      - task: test
      - |
        # Capture git state before docs generation
        git diff --name-only > /tmp/git_before_docs || touch /tmp/git_before_docs
      - task: docs
      - |
        # Check if docs generation made changes
        git diff --name-only > /tmp/git_after_docs
        if ! cmp -s /tmp/git_before_docs /tmp/git_after_docs; then
          echo ""
          echo "❌ Pre-push failed: Documentation was out of sync"
          echo ""
          echo "📋 Modified files:"
          git diff --name-only
          echo ""
          echo "🔧 Please add these changes and commit again:"
          echo "   git add ."
          echo "   git commit"
          echo ""
          rm -f /tmp/git_before_docs /tmp/git_after_docs
          exit 1
        fi
        rm -f /tmp/git_before_docs /tmp/git_after_docs
      - task: docs-lastmod-update
      - echo "✅ Pre-push checks passed"

  fmt-check:
    desc: "📝 Check Go code formatting"
    silent: true
    cmds:
      - |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "❌ Code is not formatted. Run: task fmt"
          gofmt -s -l .
          exit 1
        fi
        echo "✅ Code formatting OK"

  mod-tidy-check:
    desc: "📦 Check if go.mod is tidy"
    silent: true
    cmds:
      - go mod tidy
      - |
        if ! git diff --exit-code go.mod go.sum; then
          echo "❌ go.mod/go.sum not tidy. Run: go mod tidy"
          exit 1
        fi
        echo "✅ Go modules are tidy"

  lint-md:
    desc: "📝 Lint markdown files"
    silent: true
    cmds:
      - echo "📝 Linting markdown files..."
      - cd docs-site && npm run lint:md
      - echo "✅ Markdown linting passed"

  docs-sync-check:
    desc: "📚 Check if documentation is in sync"
    silent: true
    cmds:
      - cd docs-site && npm run docs:generate
      - |
        # Check if there are content changes (ignoring timestamp changes in frontmatter)
        DIFF_OUTPUT=$(git diff docs-site/content/_index.md docs-site/content/reference.md docs-site/content/services.md | grep -v "^[+-]date:" | grep -v "^[+-]lastmod:")
        if echo "$DIFF_OUTPUT" | grep -q "^[+-]"; then
          echo "❌ Documentation content out of sync. Run: cd docs-site && npm run docs:generate"
          echo "$DIFF_OUTPUT"
          exit 1
        fi
        echo "✅ Documentation is in sync"

  docs-lastmod-update:
    desc: "🗓️ Update lastmod dates for changed documentation files"
    silent: true
    cmds:
      - ./scripts/update-docs-lastmod.sh

  setup-hooks:
    desc: "🪝 Install Git hooks for pre-commit and pre-push checks"
    silent: true
    cmds:
      - ./scripts/setup-hooks.sh

  sync-go-version:
    desc: "🔄 Sync Go version across all configuration files"
    silent: true
    cmds:
      - ./scripts/sync-go-version.sh --fix

  check-go-version:
    desc: "✅ Check if Go versions are consistent across files"
    silent: true
    cmds:
      - ./scripts/sync-go-version.sh --check

  # ============================================================================
  # TESTING
  # ============================================================================
  test:
    desc: "🧪 Run all tests with coverage"
    deps: [deps]
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "coverage.out"
    silent: true
    cmds:
      - echo "🧪 Running tests with coverage..."
      - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      - echo "✅ Coverage report at coverage.out"

  test-unit:
    desc: "🧪 Run unit tests only (fast)"
    deps: [deps]
    silent: true
    cmds:
      - echo "🧪 Running unit tests..."
      - go test -race -short ./...
      - echo "✅ Unit tests passed"

  test-integration:
    desc: "🔗 Run integration tests"
    deps: [deps]
    silent: true
    cmds:
      - echo "🔗 Running integration tests..."
      - go test -race -tags=integration ./...
      - echo "✅ Integration tests passed"

  test-coverage:
    desc: "📊 View test coverage report in browser"
    deps: [test]
    silent: true
    cmds:
      - echo "📊 Opening coverage report..."
      - go tool cover -html=coverage.out

  lint:
    desc: "🔍 Run comprehensive linting (vet + fmt + golangci-lint)"
    deps: [deps, fmt]
    sources:
      - "**/*.go"
      - ".golangci.yml"
      - "go.mod"
      - "go.sum"
    generates:
      - ".lint-timestamp"
    silent: true
    cmds:
      - echo "🔍 Running go vet..."
      - go vet ./...
      - echo "🔍 Running golangci-lint..."
      - |
        if [ ! -f $(go env GOPATH)/bin/golangci-lint ]; then
          echo "📦 Installing golangci-lint..."
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
        fi
      - $(go env GOPATH)/bin/golangci-lint run ./cmd/otto-stack/... ./internal/...
      - touch .lint-timestamp
      - echo "✅ All linting checks passed!"
      - echo "🔍 Running golangci-lint config verify..."
      - |
        if [ ! -f .golangci.yml ]; then
          echo "❌ .golangci.yml config file not found!"
          exit 1
        fi
      - |
        if [ ! -f .golangci.yml ]; then
          echo "❌ .golangci.yml config file not found!"
          exit 1
        fi
        GOLANGCI_PATH="$(go env GOPATH)/bin/golangci-lint"
        EXPECTED_VERSION="{{.GOLANGCI_LINT_VERSION}}"

        if [ ! -f "$GOLANGCI_PATH" ]; then
          echo "📦 Installing golangci-lint $EXPECTED_VERSION..."
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin $EXPECTED_VERSION
        else
          CURRENT_VERSION=$($GOLANGCI_PATH version --format short 2>/dev/null | head -1 || echo "unknown")
          if [ "$CURRENT_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "📦 Updating golangci-lint from $CURRENT_VERSION to $EXPECTED_VERSION..."
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin $EXPECTED_VERSION
          fi
        fi
        $(go env GOPATH)/bin/golangci-lint config verify
      - echo "✅ golangci-lint config is valid"
      - echo "🔍 Running golangci-lint..."
      - $(go env GOPATH)/bin/golangci-lint run ./cmd/otto-stack/... ./internal/...
      - echo "📝 Linting documentation..."
      - cd docs-site && npm run lint:md
      - cd docs-site && npm run lint:links
      - echo "✅ All linting checks passed!"

  fmt:
    desc: "✨ Format Go code with gofmt and goimports"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - ".fmt-timestamp"
    silent: true
    cmds:
      - echo "✨ Formatting Go code..."
      - |
        if [ ! -f $(go env GOPATH)/bin/goimports ]; then
          echo "📦 Installing goimports..."
          go install golang.org/x/tools/cmd/goimports@latest
        fi
      - go fmt ./...
      - $(go env GOPATH)/bin/goimports -w .
      - touch .fmt-timestamp
      - echo "✅ Code formatted"

  docs-fmt:
    desc: "📝 Format documentation"
    dir: docs-site
    sources:
      - "**/*.md"
      - "package.json"
    generates:
      - "../.docs-fmt-timestamp"
    silent: true
    cmds:
      - echo "📝 Formatting documentation..."
      - npm run format
      - touch ../.docs-fmt-timestamp
      - echo "✅ Documentation formatted"

  security:
    desc: "🔒 Run security vulnerability scan"
    deps: [deps]
    silent: true
    cmds:
      - echo "🔒 Running security scan..."
      - |
        if ! command -v govulncheck >/dev/null 2>&1; then
          echo "📦 Installing govulncheck..."
          go install golang.org/x/vuln/cmd/govulncheck@latest
        fi
      - govulncheck ./...
      - echo "✅ Security scan complete"

  # ============================================================================
  # DOCUMENTATION
  # ============================================================================
  docs:
    desc: "📚 Generate documentation"
    deps: [build]
    silent: true
    cmds:
      - echo "📚 Generating documentation..."
      - echo "📝 Generating Hugo documentation..."
      - cd docs-site && npm run docs:generate
      - echo "✅ Documentation generated"

  # ============================================================================
  # DOCKER
  # ============================================================================
  docker-build:
    desc: "🐳 Build Docker image"
    deps: [build]
    silent: true
    cmds:
      - echo "🐳 Building Docker image..."
      - docker build -t {{.BINARY_NAME}}:{{.VERSION}} .
      - echo "✅ Docker image built at {{.BINARY_NAME}}:{{.VERSION}}"

  docker-run:
    desc: "🐳 Run Docker container interactively"
    deps: [docker-build]
    silent: true
    cmds:
      - echo "🐳 Running Docker container..."
      - docker run --rm -it {{.BINARY_NAME}}:{{.VERSION}}

  # ----------------------------------------------------------------------------
  # CLEANUP
  # ----------------------------------------------------------------------------
  clean:
    desc: "🧹 Remove build artifacts and generated files"
    silent: true
    cmds:
      - echo "🧹 Cleaning build artifacts..."
      - rm -rf {{.BUILD_DIR}}/
      - rm -f coverage.out *.test *.prof
      - rm -f .deps-timestamp .lint-timestamp .fmt-timestamp .docs-fmt-timestamp
      - echo "🧹 Cleaning generated code..."
      - find internal/ -name '*_generated.go' -type f -delete
      - echo "🧹 Cleaning Go build cache..."
      - go clean -cache
      - echo "📚 Cleaning documentation..."
      - cd docs-site && npm run docs:clean
      - echo "✅ Clean complete"

  clean-all:
    desc: "🧹 Deep clean - remove all generated files including dependencies"
    deps: [clean]
    silent: true
    cmds:
      - echo "🧹 Deep cleaning..."
      - go clean -modcache
      - rm -rf vendor/
      - echo "✅ Deep clean complete"

  # ----------------------------------------------------------------------------
  # UTILITY
  # ----------------------------------------------------------------------------
  version:
    desc: "ℹ️  Show version information"
    silent: true
    cmds:
      - echo "📋 Version Information:"
      - echo "   Version:" {{.VERSION}}
      - echo "   Commit:"  {{.COMMIT}}
      - echo "   Date:"    {{.BUILD_DATE}}

  help:
    desc: "❓ Show this help message"
    silent: true
    cmds:
      - echo "🛠️  otto-stack Task Runner"
      - echo ""
      - echo "📋 Quick Start:"
      - echo "   task build     - Build the binary"
      - echo "   task dev       - Build and run"
      - echo "   task test      - Run tests"
      - echo "   task lint      - Check code quality"
      - echo ""
      - echo "🔨 Build Tasks:"
      - echo "   build          - Build binary for current platform"
      - echo "   build-all      - Build for all platforms"
      - echo "   install        - Install to GOPATH/bin"
      - echo ""
      - echo "🚀 Development:"
      - echo "   dev            - Quick start (build + help)"
      - echo "   watch          - Auto-rebuild on changes"
      - echo ""
      - echo "🧪 Testing:"
      - echo "   test           - Run all tests with coverage"
      - echo "   test-unit      - Run unit tests only (fast)"
      - echo "   test-integration - Run integration tests"
      - echo "   test-coverage  - View coverage in browser"
      - echo ""
      - echo "🔍 Quality:"
      - echo "   lint           - Run all linting checks"
      - echo "   fmt            - Format code"
      - echo "   security       - Security vulnerability scan"
      - echo ""
      - echo "📚 Documentation:"
      - echo "   docs           - Generate documentation"
      - echo ""
      - echo "🐳 Docker:"
      - echo "   docker-build   - Build Docker image"
      - echo "   docker-run     - Run in container"
      - echo ""
      - echo "🧹 Cleanup:"
      - echo "   clean          - Remove build artifacts"
      - echo "   clean-all      - Deep clean everything"
      - echo ""
      - echo "🛠️ Development:"
      - echo "   setup-hooks    - Install Git hooks"
      - echo "   sync-go-version - Sync Go version across config files"
      - echo "   check-go-version - Check Go version consistency"
      - echo "   deps           - Update dependencies"
      - echo ""
      - echo "ℹ️  Info:"
      - echo "   version        - Show version info"
      - echo "   help           - Show this help"

version: "3"

# ============================================================================
# VARIABLES
# ============================================================================
vars:
  BINARY_NAME: otto-stack
  BUILD_DIR: build
  MODULE_PATH: github.com/otto-nation/otto-stack
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  GO_VERSION:
    sh: go version | cut -d' ' -f3
  BUILD_OS:
    sh: echo "{{OS}}"
  BUILD_ARCH:
    sh: echo "{{ARCH}}"
  LDFLAGS: '-ldflags "-X {{.MODULE_PATH}}/internal/pkg/version.AppVersion={{.VERSION}} -X {{.MODULE_PATH}}/internal/pkg/version.BuildDate={{.BUILD_DATE}} -X {{.MODULE_PATH}}/internal/pkg/version.GitCommit={{.COMMIT}} -X {{.MODULE_PATH}}/internal/pkg/version.BuildBy=taskfile"'
  GOLANGCI_LINT_VERSION: "v2.9.0"

# ============================================================================
# TASKS
# ============================================================================
tasks:
  # ============================================================================
  # DEFAULT
  # ============================================================================
  default:
    desc: "Build the binary (default task)"
    silent: true
    cmds:
      - task: build

  # ============================================================================
  # SETUP
  # ============================================================================
  setup:
    desc: "Check prerequisites, install dependencies, and configure Git hooks"
    deps: [setup:check, setup:go, setup:npm, setup-hooks]
    silent: true
    cmds:
      - echo "  ✓ All dependencies ready"

  setup:check:
    desc: "Verify required tools are installed at the correct versions"
    silent: true
    cmds:
      - |
        REQUIRED_GO=$(cat .go-version | tr -d '[:space:]')
        if command -v goenv >/dev/null 2>&1; then
          goenv install --skip-existing "$REQUIRED_GO"
          goenv local "$REQUIRED_GO"
          echo "  ✓ Go $REQUIRED_GO (via goenv)"
        else
          INSTALLED_GO=$(go version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$INSTALLED_GO" ]; then
            echo "  ✗ Go is not installed (required: $REQUIRED_GO)"
            echo "    → Install goenv (recommended): https://github.com/go-nv/goenv"
            echo "    → Or download directly: https://go.dev/dl/"
            exit 1
          fi
          if [ "$INSTALLED_GO" != "$REQUIRED_GO" ]; then
            echo "  ✗ Go version mismatch (required: $REQUIRED_GO, installed: $INSTALLED_GO)"
            echo "    → Install goenv (recommended): https://github.com/go-nv/goenv"
            echo "    → Or download directly: https://go.dev/dl/"
            exit 1
          fi
          echo "  ✓ Go $INSTALLED_GO"
        fi
      - |
        INSTALLED_NODE=$(node --version 2>/dev/null | grep -oE '[0-9]+' | head -1)
        if [ -z "$INSTALLED_NODE" ]; then
          echo "  ✗ Node.js is not installed (required: >=18)"
          echo "    → https://nodejs.org/"
          exit 1
        fi
        if [ "$INSTALLED_NODE" -lt 18 ]; then
          echo "  ✗ Node.js version too old (required: >=18, installed: v$INSTALLED_NODE)"
          echo "    → https://nodejs.org/"
          exit 1
        fi
        echo "  ✓ Node.js v$INSTALLED_NODE"
      - |
        if ! command -v docker >/dev/null 2>&1; then
          echo "  ✗ Docker is not installed"
          echo "    → https://docs.docker.com/get-started/get-docker/"
          exit 1
        fi
        if ! docker info >/dev/null 2>&1; then
          echo "  ⚠ Docker is installed but not running (required for E2E tests)"
        else
          echo "  ✓ Docker"
        fi
      - |
        HUGO_MIN="0.148.1"
        HUGO_OUTPUT=$(hugo version 2>/dev/null)
        if [ -z "$HUGO_OUTPUT" ]; then
          echo "  ✗ Hugo is not installed (required: >=$HUGO_MIN extended)"
          echo "    → macOS: brew install hugo"
          echo "    → Others: https://gohugo.io/installation/"
          exit 1
        fi
        if ! echo "$HUGO_OUTPUT" | grep -q "extended"; then
          echo "  ✗ Hugo extended variant is required (docs theme uses SCSS)"
          echo "    → macOS: brew install hugo"
          echo "    → Others: https://gohugo.io/installation/"
          exit 1
        fi
        INSTALLED_HUGO=$(echo "$HUGO_OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
        if [ "$(printf '%s\n' "$HUGO_MIN" "$INSTALLED_HUGO" | sort -V | head -1)" != "$HUGO_MIN" ]; then
          echo "  ✗ Hugo version too old (required: >=$HUGO_MIN, installed: $INSTALLED_HUGO)"
          echo "    → macOS: brew upgrade hugo"
          echo "    → Others: https://gohugo.io/installation/"
          exit 1
        fi
        echo "  ✓ Hugo $INSTALLED_HUGO (extended)"
      - |
        GIT_NAME=$(git config --global user.name 2>/dev/null)
        GIT_EMAIL=$(git config --global user.email 2>/dev/null)
        if [ -z "$GIT_NAME" ] || [ -z "$GIT_EMAIL" ]; then
          echo "  ⚠ Git identity not configured (required for commits)"
          echo "    → git config --global user.name \"Your Name\""
          echo "    → git config --global user.email \"you@example.com\""
        else
          echo "  ✓ Git ($GIT_NAME <$GIT_EMAIL>)"
        fi

  setup:go:
    desc: "Install Go dependencies"
    silent: true
    cmds:
      - go mod download
      - echo "  ✓ Go dependencies ready"

  setup:npm:
    desc: "Install npm dependencies"
    sources:
      - "docs-site/package.json"
      - "docs-site/package-lock.json"
    generates:
      - "docs-site/node_modules/.package-lock.json"
    silent: true
    cmds:
      - cd docs-site && npm install --silent
      - echo "  ✓ npm dependencies ready"

  # ============================================================================
  # GENERATE
  # ============================================================================
  generate:
    desc: "Generate code from YAML configs"
    deps: [generate:cli, generate:services, generate:messages]
    silent: true
    cmds:
      - gofmt -w $(find internal -name '*_generated.go')
      - task: generate:docs
      - echo "  ✓ Generated all code"

  generate:cli:
    desc: "Generate CLI code"
    sources:
      - "internal/config/commands.yaml"
      - "cmd/generate-cli/main.go"
      - "cmd/generate-cli/templates/*.tmpl"
    generates:
      - "internal/pkg/cli/commands_generated.go"
    silent: true
    cmds:
      - go run ./cmd/generate-cli

  generate:services:
    desc: "Generate service code"
    sources:
      - "internal/config/services/**/*.yaml"
      - "cmd/generate-services/main.go"
      - "cmd/generate-services/templates/*.tmpl"
    generates:
      - "internal/pkg/services/services_generated.go"
      - "internal/pkg/services/types_generated.go"
      - "internal/pkg/services/schema_generated.go"
    silent: true
    cmds:
      - go run ./cmd/generate-services

  generate:messages:
    desc: "Generate message constants"
    sources:
      - "internal/config/messages.yaml"
      - "cmd/generate-messages/main.go"
      - "cmd/codegen/generate_messages.go"
    generates:
      - "internal/pkg/messages/messages_generated.go"
    silent: true
    cmds:
      - go run ./cmd/generate-messages

  generate:docs:
    desc: "Generate documentation"
    sources:
      - "README.md"
      - "CONTRIBUTING.md"
      - "internal/config/schema.yaml"
      - "internal/config/commands.yaml"
      - "internal/config/services/**/*.yaml"
      - "docs-site/docs.yaml"
      - "cmd/generate-docs/*.go"
    generates:
      - "docs-site/content/_index.md"
      - "docs-site/content/cli-reference.md"
      - "docs-site/content/configuration.md"
      - "docs-site/content/contributing.md"
      - "docs-site/content/services.md"
    silent: true
    cmds:
      - go run ./cmd/generate-docs

  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    desc: "Build the Go binary for current platform"
    deps: [sync-go-version, generate, lint:go]
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"
    silent: true
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./cmd/otto-stack
      - echo "  ✓ {{.BUILD_DIR}}/{{.BINARY_NAME}}"

  build-all:
    desc: "Build binaries for all supported platforms"
    deps: [sync-go-version, generate]
    silent: true
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - GOOS=linux   GOARCH=amd64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64   ./cmd/otto-stack
      - GOOS=linux   GOARCH=arm64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-arm64   ./cmd/otto-stack
      - GOOS=darwin  GOARCH=amd64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-amd64  ./cmd/otto-stack
      - GOOS=darwin  GOARCH=arm64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-arm64  ./cmd/otto-stack
      - GOOS=windows GOARCH=amd64 go build {{.LDFLAGS}} -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-windows-amd64.exe ./cmd/otto-stack
      - echo "  ✓ All binaries in {{.BUILD_DIR}}/"

  install:
    desc: "Install the binary to GOPATH/bin"
    deps: [build]
    silent: true
    cmds:
      - go install {{.LDFLAGS}} ./cmd/otto-stack > /dev/null 2>&1
      - echo "  ✓ Installed to $(go env GOPATH)/bin/{{.BINARY_NAME}}"

  uninstall:
    desc: "Remove the binary from GOPATH/bin"
    silent: true
    cmds:
      - rm -f $(go env GOPATH)/bin/{{.BINARY_NAME}}
      - echo "  ✓ Removed $(go env GOPATH)/bin/{{.BINARY_NAME}}"

  # ============================================================================
  # DEVELOPMENT
  # ============================================================================
  dev:
    desc: "Quick start - build and show help"
    deps: [build]
    silent: true
    cmds:
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}} --help

  watch:
    desc: "Watch for changes and rebuild automatically"
    watch: true
    sources:
      - "**/*.go"
    silent: true
    cmds:
      - task: build

  # ============================================================================
  # DEPENDENCIES
  # ============================================================================
  deps:
    desc: "Download and tidy Go dependencies"
    sources:
      - "go.mod"
      - "go.sum"
    silent: true
    cmds:
      - go mod download
      - go mod tidy

  # ============================================================================
  # GIT AUTOMATION
  # ============================================================================
  pre-commit:
    desc: "Run all pre-commit checks"
    silent: true
    cmds:
      - task: generate
      - |
        CHANGES_MADE=false

        git diff --quiet && BEFORE_FMT_CLEAN=true || BEFORE_FMT_CLEAN=false
        task fmt
        if [ "$BEFORE_FMT_CLEAN" = "true" ] && ! git diff --quiet; then
          echo "  ✗ Formatting changes detected"
          CHANGES_MADE=true
        fi

        git diff --quiet && BEFORE_MOD_CLEAN=true || BEFORE_MOD_CLEAN=false
        go mod tidy
        if [ "$BEFORE_MOD_CLEAN" = "true" ] && ! git diff --quiet; then
          echo "  ✗ Go module changes detected"
          CHANGES_MADE=true
        fi

        if [ "$CHANGES_MADE" = "true" ]; then
          echo ""
          echo "  Modified files:"
          git diff --name-only | sed 's/^/    /'
          echo ""
          echo "  Stage these changes and commit again:"
          echo "    git add <files>"
          echo "    git commit"
          echo ""
          exit 1
        fi
      - task: lint
      - echo "  ✓ Pre-commit checks passed"

  pre-push:
    desc: "Run all pre-push checks"
    deps: [build, test]
    silent: true
    cmds:
      - task: validate:commits
      - task: deadcode
      - task: docs
      - |
        if ! git diff --quiet; then
          echo ""
          echo "  ✗ Documentation was out of sync"
          echo ""
          echo "  Modified files:"
          git diff --name-only | sed 's/^/    /'
          echo ""
          echo "  Stage these changes and commit again:"
          echo "    git add ."
          echo "    git commit"
          echo ""
          exit 1
        fi
      - echo "  ✓ Pre-push checks passed"

  docs-lastmod-update:
    desc: "Update lastmod dates for changed documentation files"
    sources:
      - "docs-site/content/**/*.md"
    silent: true
    cmds:
      - ./scripts/update-docs-lastmod.sh

  setup-hooks:
    desc: "Install Git hooks for pre-commit and pre-push checks"
    sources:
      - "scripts/setup-hooks.sh"
      - ".git/hooks/*"
    silent: true
    cmds:
      - ./scripts/setup-hooks.sh
      - echo "  ✓ Git hooks installed"

  sync-go-version:
    desc: "Sync Go version across all configuration files"
    sources:
      - ".go-version"
      - ".github/workflows/*.yml"
      - "Dockerfile"
      - "go.mod"
    silent: true
    cmds:
      - ./scripts/go-version.sh sync --fix
      - GOTOOLCHAIN=local go mod tidy

  check-go-version:
    desc: "Check if Go versions are consistent across files"
    sources:
      - ".go-version"
      - ".github/workflows/*.yml"
      - "Dockerfile"
      - "go.mod"
    silent: true
    cmds:
      - ./scripts/go-version.sh sync --check

  # ============================================================================
  # TESTING
  # ============================================================================
  test:
    desc: "Run all tests with coverage"
    deps: [test-unit]
    silent: true
    cmds:
      - echo "  ✓ Coverage report at coverage.out"

  test-unit:
    desc: "Run unit tests only (fast)"
    deps: [deps]
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "coverage.out"
    silent: true
    cmds:
      - |
        if [ "${CGO_ENABLED:-1}" = "0" ]; then
          go test -v -tags=unit -coverprofile=coverage.out -covermode=atomic ./internal/...
        else
          go test -v -race -tags=unit -coverprofile=coverage.out -covermode=atomic ./internal/...
        fi

  test-e2e:
    desc: "Run end-to-end integration tests only"
    deps: [deps]
    silent: true
    preconditions:
      - sh: docker info
        msg: "Docker is required for E2E tests"
    cmds:
      - go test -tags=integration -v -timeout=10m -parallel=1 -count=1 ./test/e2e/... | tee

  test-coverage:
    desc: "View test coverage report in browser"
    deps: [test]
    silent: true
    cmds:
      - go tool cover -html=coverage.out

  # ============================================================================
  # QUALITY
  # ============================================================================
  lint:
    desc: "Run comprehensive linting (vet + fmt + golangci-lint)"
    deps: [lint:go]
    sources:
      - "**/*.go"
      - ".golangci.yml"
      - "go.mod"
      - "go.sum"
    silent: true
    cmds:
      - task: lint:docs
      - echo "  ✓ All linting checks passed"

  lint:go:
    desc: "Run Go-only linting (vet + golangci-lint) - for CI"
    deps: [deps, fmt]
    sources:
      - "**/*.go"
      - ".golangci.yml"
      - "go.mod"
      - "go.sum"
    silent: true
    cmds:
      - mkdir -p .task
      - go vet ./...
      - |
        GOLANGCI_PATH="$(go env GOPATH)/bin/golangci-lint"
        EXPECTED_VERSION="{{.GOLANGCI_LINT_VERSION}}"

        if [ ! -f "$GOLANGCI_PATH" ]; then
          printf "  → Installing golangci-lint %s...\n" "$EXPECTED_VERSION"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin $EXPECTED_VERSION > /dev/null 2>&1
        else
          CURRENT_VERSION="v$($GOLANGCI_PATH version 2>/dev/null | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+' | head -1 || echo "unknown")"
          if [ "$CURRENT_VERSION" != "$EXPECTED_VERSION" ]; then
            printf "  → Updating golangci-lint to %s...\n" "$EXPECTED_VERSION"
            curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin $EXPECTED_VERSION > /dev/null 2>&1
          fi
        fi

        $GOLANGCI_PATH config verify
        $GOLANGCI_PATH run ./cmd/otto-stack/... ./internal/...
      - go build -o /dev/null ./cmd/otto-stack
      - touch .task/go-lint-timestamp

  lint:docs:
    desc: "Lint documentation files"
    sources:
      - "docs-site/content/**/*.md"
      - "docs-site/README.md"
      - "docs-site/.markdownlint.jsonc"
      - "docs-site/.mlc_config.json"
    silent: true
    cmds:
      - cd docs-site && npm run lint:md
      - cd docs-site && npm run lint:links

  fmt:
    desc: "Format Go code with gofmt and goimports"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    silent: true
    cmds:
      - |
        if [ ! -f $(go env GOPATH)/bin/goimports ]; then
          echo "  → Installing goimports..."
          go install golang.org/x/tools/cmd/goimports@latest > /dev/null 2>&1
        fi
      - go fmt ./... > /dev/null 2>&1
      - $(go env GOPATH)/bin/goimports -w . > /dev/null 2>&1

  security:
    desc: "Run security vulnerability scan"
    deps: [deps]
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    silent: true
    cmds:
      - |
        if ! command -v govulncheck >/dev/null 2>&1; then
          echo "  → Installing govulncheck..."
          go install golang.org/x/vuln/cmd/govulncheck@latest
        fi
      - govulncheck ./...
      - |
        if grep -r -E "(password|pwd|secret|key|token)\s*[:=]\s*['\"][^'\"]{8,}" --include="*.go" --exclude="*_test.go" --exclude="*_generated.go" . ; then
          echo "  ✗ Potential hardcoded secrets found"
          exit 1
        fi
      - echo "  ✓ Security scan passed"

  deadcode:
    desc: "Check for unreachable code (informational; set DEADCODE_STRICT=true for strict mode)"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    silent: true
    cmds:
      - |
        DEADCODE_OUTPUT=$(go run golang.org/x/tools/cmd/deadcode@latest ./... 2>&1)

        if [ -n "$DEADCODE_OUTPUT" ]; then
          FILTERED=$(echo "$DEADCODE_OUTPUT" | \
            grep -v "test/e2e/framework" | \
            grep -v "test/testhelpers" | \
            grep -v "test/testutil" | \
            grep -v "cmd/codegen" | \
            grep -v "cmd/generate-services" | \
            grep -v "internal/cli/root_factory.go" || true)

          if [ -n "$FILTERED" ]; then
            DEADCODE_COUNT=$(echo "$FILTERED" | wc -l | tr -d ' ')
            printf "  → %s unreachable functions found\n" "$DEADCODE_COUNT"

            if [ "${DEADCODE_STRICT:-false}" = "true" ]; then
              echo ""
              echo "  ✗ Dead code detected (strict mode):"
              echo "$FILTERED"
              echo ""
              echo "  Review DEAD_CODE_AUDIT.md for analysis"
              exit 1
            else
              echo "  → Run DEADCODE_STRICT=true task deadcode to see details"
            fi
          else
            echo "  ✓ No dead code found"
          fi
        else
          echo "  ✓ No dead code found"
        fi

  # ============================================================================
  # VALIDATION
  # ============================================================================
  validate:
    desc: "Run all validation checks"
    deps: [validate:code, validate:docs, validate:homebrew]
    silent: true
    cmds:
      - echo "  ✓ All validation checks passed"

  validate:code:
    desc: "Validate Go code (lint + test)"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
    silent: true
    cmds:
      - task: lint:go
      - task: test
      - echo "  ✓ Code validation passed"

  validate:docs:
    desc: "Validate documentation (Hugo build + linting)"
    deps: [setup:npm]
    sources:
      - "docs-site/content/**/*.md"
      - "docs-site/config/**/*"
    silent: true
    cmds:
      - cd docs-site && hugo --gc --minify --destination public-test
      - cd docs-site && rm -rf public-test
      - task: lint:docs
      - echo "  ✓ Documentation valid"

  validate:homebrew:
    desc: "Validate Homebrew formula syntax and style"
    sources:
      - "Formula/otto-stack.rb"
    silent: true
    status:
      - test ! -f "Formula/otto-stack.rb"
      - test ! command -v brew >/dev/null 2>&1
    cmds:
      - ruby -c Formula/otto-stack.rb
      - echo "  ✓ Homebrew formula valid"

  validate:commits:
    desc: "Validate commit message format using commitlint (same as CI)"
    silent: true
    cmds:
      - |
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        BASE_BRANCH=${BASE_BRANCH:-main}

        if git rev-parse --verify origin/$BASE_BRANCH >/dev/null 2>&1; then
          FROM="origin/$BASE_BRANCH"
        else
          FROM="$BASE_BRANCH"
        fi

        npx --yes -p @commitlint/config-conventional -p @commitlint/cli commitlint --from "$FROM" --to HEAD
        echo "  ✓ Commit messages valid"

  # ============================================================================
  # DOCUMENTATION
  # ============================================================================
  docs:
    desc: "Generate and validate documentation"
    deps: [generate:docs]
    silent: true
    cmds:
      - echo "  ✓ Documentation generated"

  docs-serve:
    desc: "Serve documentation locally"
    deps: [generate:docs]
    silent: true
    cmds:
      - cd docs-site && hugo server --disableFastRender --noHTTPCache

  # ============================================================================
  # DOCKER
  # ============================================================================
  docker-build:
    desc: "Build Docker image"
    deps: [build]
    silent: true
    cmds:
      - docker build -t {{.BINARY_NAME}}:{{.VERSION}} .
      - echo "  ✓ {{.BINARY_NAME}}:{{.VERSION}}"

  docker-run:
    desc: "Run Docker container interactively"
    deps: [docker-build]
    silent: true
    cmds:
      - docker run --rm -it {{.BINARY_NAME}}:{{.VERSION}}

  # ============================================================================
  # CLEANUP
  # ============================================================================
  clean:
    desc: "Remove build artifacts and generated files"
    silent: true
    cmds:
      - rm -rf {{.BUILD_DIR}}/
      - rm -f coverage.out *.test *.prof
      - rm -f .deps-timestamp .lint-timestamp .fmt-timestamp .docs-fmt-timestamp
      - find internal/ -name '*_generated.go' -type f -delete
      - go clean -cache
      - cd docs-site && npm run docs:clean
      - echo "  ✓ Clean complete"

  clean-all:
    desc: "Deep clean - remove all generated files including dependencies"
    deps: [clean]
    silent: true
    cmds:
      - go clean -modcache
      - rm -rf vendor/
      - echo "  ✓ Deep clean complete"

  # ============================================================================
  # UTILITY
  # ============================================================================
  version:
    desc: "Show version information"
    silent: true
    cmds:
      - |
        printf "  version  %s\n" "{{.VERSION}}"
        printf "  commit   %s\n" "{{.COMMIT}}"
        printf "  date     %s\n" "{{.BUILD_DATE}}"

  help:
    desc: "Show this help message"
    silent: true
    cmds:
      - |
        echo "otto-stack  task runner"
        echo ""
        echo "  Build:"
        echo "    task build              Build binary for current platform"
        echo "    task build-all          Build for all platforms"
        echo "    task install            Install to GOPATH/bin"
        echo ""
        echo "  Development:"
        echo "    task dev                Build and run --help"
        echo "    task watch              Auto-rebuild on file changes"
        echo "    task deps               Update Go dependencies"
        echo ""
        echo "  Generate:"
        echo "    task generate           Regenerate all code from YAML configs"
        echo "    task generate:cli       Regenerate CLI commands and flags"
        echo "    task generate:messages  Regenerate message constants"
        echo "    task generate:docs      Regenerate documentation"
        echo ""
        echo "  Test:"

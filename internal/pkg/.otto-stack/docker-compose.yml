networks:
    default:
        name: test-project-network
services:
    mysql:
        environment:
            DATABASE_URL: mysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD:-password}@${MYSQL_HOST:-localhost}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-local_dev}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-local_dev}
            MYSQL_HOST: ${MYSQL_HOST:-localhost}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
            MYSQL_PORT: ${MYSQL_PORT:-3306}
            MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-password}
            MYSQL_URL: mysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD:-password}@${MYSQL_HOST:-localhost}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-local_dev}
            MYSQL_USER: ${MYSQL_USER:-root}
        image: mysql:8.0
        labels:
            otto.managed: "true"
            otto.project: dev
            otto.service: mysql
            otto.sharing-mode: isolated
            otto.version: dev
        mem_limit: 512m
        ports:
            - 3306:3306
        restart: unless-stopped
    postgres:
        command:
            - postgres
            - -c
            - shared_preload_libraries=pg_stat_statements
            - -c
            - pg_stat_statements.track=all
            - -c
            - max_connections=200
            - -c
            - log_statement=all
            - -c
            - log_destination=stderr
            - -c
            - log_min_duration_statement=100ms
        environment:
            DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-local_dev}
            PGHOST: ${POSTGRES_HOST:-localhost}
            POSTGRES_DB: ${POSTGRES_DB:-local_dev}
            POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
            POSTGRES_PORT: ${POSTGRES_PORT:-5432}
            POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-local_dev}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            SERVICE_ENDPOINT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-local_dev}
        image: postgres:15
        labels:
            otto.managed: "true"
            otto.project: dev
            otto.service: postgres
            otto.sharing-mode: isolated
            otto.version: dev
        mem_limit: 512m
        ports:
            - 5432:5432
        restart: unless-stopped
    redis:
        command:
            - redis-server
            - --requirepass
            - ${REDIS_PASSWORD:-password}
            - --appendonly
            - "yes"
        environment:
            REDIS_HOST: ${REDIS_HOST:-localhost}
            REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
            REDIS_PORT: ${REDIS_PORT:-6379}
            REDIS_URL: redis://:${REDIS_PASSWORD:-password}@${REDIS_HOST:-localhost}:${REDIS_PORT:-6379}
        image: redis:7-alpine
        labels:
            otto.managed: "true"
            otto.project: dev
            otto.service: redis
            otto.sharing-mode: isolated
            otto.version: dev
        mem_limit: 256m
        ports:
            - 6379:6379
        restart: unless-stopped

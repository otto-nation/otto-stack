validation:
  skip_warnings:
    description: "Skip validation warnings during startup"
    default: false
  allow_multiple_databases:
    description: "Allow both MySQL and PostgreSQL"
    default: false

advanced:
  auto_start:
    description: "Automatically run 'up' after initialization completes"
    default: false
  pull_latest_images:
    description: "Pull the latest Docker images before starting services"
    default: false
  cleanup_on_recreate:
    description: "Remove volumes when force-recreating services (full data reset)"
    default: false

metadata:
  schema_version: "1.0"
  generated_by: "otto-stack"
  description: "Configuration schema for otto-stack projects"

templates:
  project_name: "{{project_name}}"
  otto_version: "{{otto_version}}"
  config_docs_url: "{{config_docs_url}}"
  service_config_url: "{{service_config_url}}"

schema:
  version:
    type: string
    default: "{{otto_version}}"
    description: "Otto-stack version that generated this config"

  project:
    type: object
    description: "Project configuration settings"
    properties:
      name:
        type: string
        default: "{{project_name}}"
        description: "Project name"

  stack:
    type: object
    description: "Stack service configuration"
    properties:
      enabled:
        type: array
        items:
          type: string
        default: []
        description: "List of enabled services"

  service_configuration:
    type: object
    default: {}
    description: "Service-specific configuration overrides"

  sharing:
    type: object
    description: "Container sharing configuration allows services to be shared across multiple projects, reducing resource usage and startup time"
    properties:
      enabled:
        type: boolean
        default: true
        description: "Enable container sharing across projects. When enabled, containers are prefixed with 'otto-stack-' and tracked in ~/.otto-stack/shared/containers.yaml"
      services:
        type: object
        default: {}
        description: "Per-service sharing overrides (service_name: true/false). If empty, all services are shared when enabled is true"

  validation:
    type: object
    description: "Validation and safety settings"
    properties:
      options:
        type: object
        default: {}
        description: "Named validation checks to enable or disable (e.g., config-syntax: true, docker: true)"

name: prometheus-service
description: Prometheus metrics collection and monitoring system
type: container
runtime:
  image: prom/prometheus:latest
  ports:
    - host: "9089"
      container: "9089"
      protocol: tcp
  environment:
    PROMETHEUS_HOST: ${PROMETHEUS_HOST:-localhost}
    PROMETHEUS_PORT: ${PROMETHEUS_PORT:-9090}
    PROMETHEUS_URL: http://${PROMETHEUS_HOST:-localhost}:${PROMETHEUS_PORT:-9090}
  container:
    restart: unless-stopped
    networks:
      - otto-stack
    memory_limit: 256m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-admin-api
integration:
  connection:
    type: cli
    default_port: 9090
    client: web
  dependencies:
    provides:
      - metrics
      - monitoring
documentation:
  examples:
    - curl http://localhost:9089/metrics
  usage_notes: Metrics collection and monitoring. Scrapes application /metrics endpoints.
  links:
    - https://prometheus.io/docs/
  use_cases:
    - Application metrics collection
    - Performance monitoring
    - Alerting and notifications

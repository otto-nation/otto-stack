name: prometheus-service
description: Prometheus metrics collection and monitoring system
service_type: container

environment:
  PROMETHEUS_HOST: ${PROMETHEUS_HOST:-localhost}
  PROMETHEUS_PORT: ${PROMETHEUS_PORT:-9090}
  PROMETHEUS_URL: http://${PROMETHEUS_HOST:-localhost}:${PROMETHEUS_PORT:-9090}

container:
  image: prom/prometheus:latest
  ports:
    - external: "9089"
      internal: "9089"
      protocol: tcp
  restart: unless-stopped
  networks:
    - otto-stack
  memory_limit: 256m
  command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.console.libraries=/etc/prometheus/console_libraries
    - --web.console.templates=/etc/prometheus/consoles
    - --storage.tsdb.retention.time=15d
    - --web.enable-lifecycle
    - --web.enable-admin-api
  health_check:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9089/-/healthy"]
    interval: 30s
    timeout: 10s
    retries: 3

service:
  connection:
    type: web
    default_port: 9090
    url_pattern: "http://localhost:9089"
  dependencies:
    provides:
      - metrics
      - monitoring

documentation:
  examples:
    - curl http://localhost:9089/metrics
  usage_notes: Metrics collection and monitoring. Scrapes application /metrics endpoints.
  links:
    - https://prometheus.io/docs/
  use_cases:
    - Application metrics collection
    - Performance monitoring
    - Alerting and notifications
  web_interfaces:
    - name: Prometheus UI
      url: http://localhost:9089
      description: Prometheus web interface for querying metrics

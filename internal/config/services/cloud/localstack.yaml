name: localstack
description: LocalStack core AWS service emulator
hidden: true
service_type: container

service:
  characteristics:
    - network_service
  dependencies:
    provides:
      - aws-emulation
      - cloud-core

environment:
  AWS_ACCESS_KEY_ID: test
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL: http://${LOCALSTACK_HOST:-localhost}:${LOCALSTACK_PORT:-4566}
  AWS_SECRET_ACCESS_KEY: test
  LOCALSTACK_HOST: ${LOCALSTACK_HOST:-localhost}
  LOCALSTACK_PORT: ${LOCALSTACK_PORT:-4566}
  LOCALSTACK_URL: http://${LOCALSTACK_HOST:-localhost}:${LOCALSTACK_PORT:-4566}
  SERVICES: ${LOCALSTACK_SERVICES:-}

container:
  image: localstack/localstack:latest
  ports:
    - external: "4566"
      internal: "4566"
      protocol: tcp
  restart: unless-stopped
  memory_limit: 1g
  health_check:
    test: ["CMD", "nc", "-z", "localhost", "4566"]
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 30s

init_container:
  enabled: true
  image: amazon/aws-cli:latest
  scripts:
    - type: aws_resources
      content: |
        # Create SQS queues
        {{range .sqs_queues}}
        aws --endpoint-url=${SERVICE_ENDPOINT_URL} sqs create-queue --queue-name {{.name}}
        {{end}}
        
        # Create SNS topics  
        {{range .sns_topics}}
        aws --endpoint-url=${SERVICE_ENDPOINT_URL} sns create-topic --name {{.name}}
        {{end}}
        
        # Create S3 buckets
        {{range .s3_buckets}}
        aws --endpoint-url=${SERVICE_ENDPOINT_URL} s3 mb s3://{{.name}}
        {{end}}
  environment:
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
  depends_on_service: true
  timeout: "30s"

documentation:
  examples:
    - aws --endpoint-url=http://localhost:4566 s3 ls
  usage_notes: Core LocalStack service providing AWS API emulation for local development. Web dashboard requires LocalStack Pro license.
  links:
    - https://docs.localstack.cloud/
  use_cases:
    - AWS service emulation for local development
    - Cloud service testing without AWS costs
    - Offline development environment

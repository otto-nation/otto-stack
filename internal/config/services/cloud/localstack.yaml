name: localstack
description: Complete LocalStack AWS emulation environment
service_type: container

container:
  restart: unless-stopped

service:
  dependencies:
    provides:
      - aws-emulation
      - cloud-services

documentation:
  examples:
    - aws --endpoint-url=http://localhost:4566 s3 ls
    - aws --endpoint-url=http://localhost:4566 sqs list-queues
  usage_notes: Complete LocalStack setup with core services and automatic resource initialization
  links:
    - https://docs.localstack.cloud/
  use_cases:
    - Complete AWS service emulation for local development
    - Cloud service testing without AWS costs
    - Offline development environment with pre-configured resources
